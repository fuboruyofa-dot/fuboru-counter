<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History Log — Fuboru Counter</title>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <style>
    .tab-bar { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:0; }
    .tab-btn {
      padding:9px 20px; border:none; background:none; cursor:pointer;
      font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
      color:var(--text2); border-bottom:2px solid transparent;
      margin-bottom:-1px; transition:all 0.15s;
    }
    .tab-btn.active { color:var(--orange); border-bottom-color:var(--orange); }
    .tab-btn:hover { color:var(--text); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .filter-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:flex-end; }
    .filter-bar .form-group { margin:0; flex:1; min-width:130px; }
    .btn-xlsx { background:#16A34A!important; color:#fff!important; }
    .btn-pdf  { background:#EF4444!important; color:#fff!important; }
    .badge-complete { background:rgba(34,197,94,0.12)!important; color:#16A34A!important; border:1px solid rgba(34,197,94,0.25)!important; }
    .pct-complete { animation:pulse-g 1.5s ease-in-out infinite; }
    @keyframes pulse-g { 0%,100%{opacity:1}50%{opacity:.5} }
  </style>
</head>
<body id="pageBody">
<script type="module">
import {
  db, requireAuth, initSidebar, renderSidebar,
  formatDateTime,
  collection, collectionGroup, query, where, orderBy, limit, getDocs
} from '/js/firebase.js';

let allSessions = [];
let allLogs     = [];

async function init() {
  const user   = await requireAuth();
  const params = new URLSearchParams(window.location.search);
  const filterMachine = params.get('machine') || '';

  document.getElementById('pageBody').innerHTML = `
  ${renderSidebar('history', user.role)}
  <div class="main">
    <div class="topbar">
      <h1>History Log</h1>
      <div class="topbar-actions">
        <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)">
          <div style="background:var(--blue);width:6px;height:6px;border-radius:50%;animation:blink 2s infinite"></div>
          Auto-refresh 30d
        </div>
        <button class="btn btn-secondary" onclick="refreshActive()">↻ Refresh</button>
        <button class="btn btn-xlsx" onclick="exportExcel()">⬇ Excel</button>
        <button class="btn btn-pdf"  onclick="exportPDF()">⬇ PDF</button>
      </div>
    </div>
    <div class="page-content">

      <!-- TAB BAR -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tabBtnSession" onclick="switchTab('session')">📋 Sesi Produksi</button>
        <button class="tab-btn"        id="tabBtnLog"     onclick="switchTab('log')">🕐 Rekam Jejak (per interval)</button>
      </div>

      <!-- FILTER BERSAMA -->
      <div class="filter-bar">
        <div class="form-group"><label>Dari Tanggal</label><input type="date" id="fFrom"/></div>
        <div class="form-group"><label>Sampai Tanggal</label><input type="date" id="fTo"/></div>
        <div class="form-group">
          <label>Mesin</label>
          <select id="fMachine"><option value="">Semua Mesin</option></select>
        </div>
        <div class="form-group" id="wrapStatus">
          <label>Status</label>
          <select id="fStatus">
            <option value="">Semua</option>
            <option value="complete">Complete</option>
            <option value="running">Running</option>
            <option value="idle">Idle</option>
          </select>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-primary" onclick="refreshActive()">Cari</button>
        </div>
      </div>

      <!-- PANEL SESI -->
      <div class="tab-panel active" id="panelSession">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th>Waktu Mulai</th><th>Mesin</th><th>Operator</th><th>Produk</th>
              <th>Layer</th><th>Jumlah</th><th>Target</th><th>Progress</th>
              <th>Durasi</th><th>Downtime</th><th>Efisiensi</th><th>Status</th>
            </tr></thead>
            <tbody id="bodySession"><tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text2)">Memuat...</td></tr></tbody>
          </table>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:10px;display:flex;justify-content:space-between">
          <span id="countSession"></span><span id="refreshSession"></span>
        </div>
      </div>

      <!-- PANEL LOG -->
      <div class="tab-panel" id="panelLog">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th>Waktu</th><th>Mesin</th><th>Sesi ID</th>
              <th>Jumlah</th><th>Target Sesi</th><th>Progress</th>
              <th>Elapsed</th><th>Downtime</th><th>Efisiensi</th>
            </tr></thead>
            <tbody id="bodyLog"><tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text2)">Pilih tab untuk memuat...</td></tr></tbody>
          </table>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:10px;display:flex;justify-content:space-between">
          <span id="countLog"></span><span id="refreshLog"></span>
        </div>
      </div>

    </div>
  </div>` + document.getElementById('pageBody').innerHTML;

  initSidebar(user);

  const today = new Date().toISOString().split('T')[0];
  const week  = new Date(Date.now()-30*86400000).toISOString().split('T')[0];
  document.getElementById('fFrom').value = week;
  document.getElementById('fTo').value   = today;

  await loadMachineOptions(filterMachine);
  await loadSessions();
  setInterval(() => { if (activeTab==='session') loadSessions(true); else loadLogs(true); }, 30000);
}

let activeTab = 'session';
let logLoaded = false;

window.switchTab = function(tab) {
  activeTab = tab;
  document.getElementById('panelSession').classList.toggle('active', tab==='session');
  document.getElementById('panelLog').classList.toggle('active', tab==='log');
  document.getElementById('tabBtnSession').classList.toggle('active', tab==='session');
  document.getElementById('tabBtnLog').classList.toggle('active', tab==='log');
  document.getElementById('wrapStatus').style.display = tab==='session' ? '' : 'none';
  if (tab==='log' && !logLoaded) loadLogs();
};

window.refreshActive = function() {
  if (activeTab==='session') loadSessions(); else loadLogs();
};

async function loadMachineOptions(preselect='') {
  try {
    const snap = await getDocs(collection(db,'machines'));
    const sel  = document.getElementById('fMachine');
    snap.docs.forEach(d => {
      const m=d.data(), opt=document.createElement('option');
      opt.value = m.machine_code||d.id;
      opt.textContent = `${m.machine_name||d.id} (${m.machine_code||d.id})`;
      if (opt.value===preselect) opt.selected=true;
      sel.appendChild(opt);
    });
  } catch(e) { console.warn(e); }
}

// ── LOAD SESI ──
window.loadSessions = async function(silent=false) {
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const machine=document.getElementById('fMachine').value;
  const status=document.getElementById('fStatus').value;
  const tbody=document.getElementById('bodySession');
  if (!silent) tbody.innerHTML=`<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text2)">Memuat...</td></tr>`;

  let rows=[];
  try {
    let q = from
      ? query(collection(db,'sessions'),where('started_at','>=',new Date(from)),orderBy('started_at','desc'),limit(300))
      : query(collection(db,'sessions'),orderBy('started_at','desc'),limit(300));
    rows = (await getDocs(q)).docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) {
    try { rows=(await getDocs(query(collection(db,'sessions'),limit(300)))).docs.map(d=>({id:d.id,...d.data()})); }
    catch(e2){console.error(e2);}
  }

  if (to)      rows=rows.filter(r=>!r.started_at||r.started_at?.toDate()<=new Date(to+'T23:59:59'));
  if (from)    rows=rows.filter(r=>!r.started_at||r.started_at?.toDate()>=new Date(from));
  if (machine) rows=rows.filter(r=>(r.machine_code||r.id)===machine);
  if (status==='complete') rows=rows.filter(r=>r.target>0&&(r.count||0)>=r.target);
  else if (status) rows=rows.filter(r=>r.status===status);
  rows.sort((a,b)=>(b.started_at?.toDate?.()??new Date(0))-(a.started_at?.toDate?.()??new Date(0)));
  allSessions=rows;
  renderSessions(rows);
  const now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('countSession').textContent=`${rows.length} sesi`;
  document.getElementById('refreshSession').textContent=`Update: ${now}`;
};

// ── LOAD LOGS (rekam jejak per interval) ──
window.loadLogs = async function(silent=false) {
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const machine=document.getElementById('fMachine').value;
  const tbody=document.getElementById('bodyLog');
  if (!silent) tbody.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text2)">Memuat...</td></tr>`;

  let rows=[];
  try {
    // Query semua logs subcollection dengan collectionGroup
    let q = from
      ? query(collectionGroup(db,'logs'),where('timestamp','>=',new Date(from)),orderBy('timestamp','desc'),limit(500))
      : query(collectionGroup(db,'logs'),orderBy('timestamp','desc'),limit(500));
    rows=(await getDocs(q)).docs.map(d=>({id:d.id,_path:d.ref.path,...d.data()}));
  } catch(e) {
    console.warn('collectionGroup fallback:', e.message);
    // Fallback: ambil dari setiap sesi yang sudah di-load
    if (allSessions.length > 0) {
      for (const s of allSessions.slice(0,20)) {
        try {
          const logsSnap=await getDocs(collection(db,'sessions',s.id,'logs'));
          logsSnap.docs.forEach(d=>rows.push({id:d.id,_sessionId:s.id,machine_code:s.machine_code,_path:d.ref.path,...d.data()}));
        } catch(e2){}
      }
    }
  }

  // Gabungkan info mesin dari session_id
  if (to)      rows=rows.filter(r=>!r.timestamp||r.timestamp?.toDate()<=new Date(to+'T23:59:59'));
  if (from)    rows=rows.filter(r=>!r.timestamp||r.timestamp?.toDate()>=new Date(from));

  // Filter mesin — ambil machine_code dari path (sessions/{sesId}/logs/{logId})
  if (machine) {
    rows=rows.filter(r=>{
      const mc=r.machine_code||r._path?.split('/')[1]?.split('_')[0]||'';
      return mc===machine||r.session_id?.startsWith(machine);
    });
  }

  rows.sort((a,b)=>(b.timestamp?.toDate?.()??new Date(0))-(a.timestamp?.toDate?.()??new Date(0)));
  allLogs=rows;
  renderLogs(rows);
  logLoaded=true;
  const now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('countLog').textContent=`${rows.length} rekam jejak`;
  document.getElementById('refreshLog').textContent=`Update: ${now}`;
};

// ── HELPERS ──
function fmtDur(sec) {
  if (!sec||sec<=0) return '-';
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  if(h>0) return `${h}j ${m}m`; if(m>0) return `${m}m ${s}d`; return `${s}d`;
}
function calcDur(r) {
  if (!r.started_at) return null;
  const s=r.started_at.toDate?r.started_at.toDate():new Date(r.started_at);
  const e=r.finished_at?(r.finished_at.toDate?r.finished_at.toDate():new Date(r.finished_at)):new Date();
  return Math.max(0,Math.floor((e-s)/1000));
}
function fmtPct(count,target) {
  if (!target) return {pct:0,color:'var(--text2)',complete:false};
  const pct=Math.min(100,Math.round((count/target)*100));
  return {pct,color:pct>=100?'#16A34A':pct>=60?'var(--yellow)':'var(--red)',complete:pct>=100};
}

// ── RENDER SESI ──
function renderSessions(rows) {
  const tbody=document.getElementById('bodySession');
  if (!rows.length){tbody.innerHTML=`<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text2)">Tidak ada data</td></tr>`;return;}
  tbody.innerHTML=rows.map((r,i)=>{
    const cnt=r.count||0,tgt=r.target||0;
    const {pct,color,complete}=fmtPct(cnt,tgt);
    const isActive=r.status==='running'||r.status==='idle';
    const dur=calcDur(r);
    let badge=complete?`<span class="badge badge-complete">✓ Complete</span>`
      :r.status==='running'?`<span class="badge badge-blue">Running</span>`
      :r.status==='idle'?`<span class="badge badge-orange">Idle</span>`
      :`<span class="badge badge-gray">${r.status||'-'}</span>`;
    const bg=complete?'background:rgba(34,197,94,0.04)':r.status==='running'?'background:rgba(59,130,246,0.03)':'';
    return `<tr style="${bg}">
      <td style="color:var(--text2);font-size:11px">${rows.length-i}</td>
      <td style="font-size:12px">${formatDateTime(r.started_at)}</td>
      <td><code style="color:var(--orange);font-size:11px;background:var(--bg3);padding:2px 6px;border-radius:4px">${r.machine_code||'-'}</code></td>
      <td>${r.operator_name||'-'}</td>
      <td>${r.product_name||'-'}</td>
      <td style="text-align:center">${r.layers||1}</td>
      <td style="font-weight:700">${cnt.toLocaleString()}</td>
      <td>${tgt>0?tgt.toLocaleString():'-'}</td>
      <td><div style="display:flex;align-items:center;gap:6px;min-width:100px">
        <div class="progress-bar" style="flex:1"><div class="progress-fill ${complete?'pct-complete':''}" style="width:${pct}%;background:${color}"></div></div>
        <span style="font-size:11px;color:${color};width:34px;font-weight:600">${pct}%</span>
      </div></td>
      <td style="font-size:12px">${fmtDur(dur)}${isActive?'<br><span style="font-size:10px;color:var(--blue)">● Berjalan</span>':''}</td>
      <td style="font-size:12px">${r.downtime_sec>0?fmtDur(r.downtime_sec):'<span style="color:var(--text2)">-</span>'}</td>
      <td style="text-align:center">${r.efficiency_pct!=null?`<span style="font-weight:600;color:${(r.efficiency_pct||0)>=85?'#16A34A':(r.efficiency_pct||0)>=60?'var(--yellow)':'var(--red)'}">${r.efficiency_pct}%</span>`:'-'}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

// ── RENDER LOGS ──
function renderLogs(rows) {
  const tbody=document.getElementById('bodyLog');
  if (!rows.length){tbody.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text2)">Tidak ada rekam jejak. Pastikan ESP32 sudah mengirim datalog.</td></tr>`;return;}

  // Cari target sesi dari allSessions
  const sesMap={};
  allSessions.forEach(s=>sesMap[s.id]=s);

  tbody.innerHTML=rows.map((r,i)=>{
    const cnt=parseInt(r.count)||0;
    const ses=sesMap[r.session_id]||{};
    const tgt=ses.target||0;
    const {pct,color}=fmtPct(cnt,tgt);
    const machCode=r.machine_code||ses.machine_code||r.session_id?.split('_')[0]||'-';
    const effC=(r.efficiency_pct||0)>=85?'#16A34A':(r.efficiency_pct||0)>=60?'var(--yellow)':'var(--red)';
    const shortSesId=r.session_id?r.session_id.slice(-12):'?';
    return `<tr>
      <td style="color:var(--text2);font-size:11px">${rows.length-i}</td>
      <td style="font-size:12px">${formatDateTime(r.timestamp)}</td>
      <td><code style="color:var(--orange);font-size:11px;background:var(--bg3);padding:2px 6px;border-radius:4px">${machCode}</code></td>
      <td style="font-size:11px;color:var(--text2)" title="${r.session_id||''}">${shortSesId}</td>
      <td style="font-weight:700">${cnt.toLocaleString()}</td>
      <td>${tgt>0?tgt.toLocaleString():'-'}</td>
      <td><div style="display:flex;align-items:center;gap:6px;min-width:90px">
        <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
        <span style="font-size:11px;color:${color};width:34px;font-weight:600">${pct}%</span>
      </div></td>
      <td style="font-size:12px">${fmtDur(parseInt(r.elapsed_sec)||0)}</td>
      <td style="font-size:12px">${(parseInt(r.downtime_sec)||0)>0?fmtDur(parseInt(r.downtime_sec)):'<span style="color:var(--text2)">-</span>'}</td>
      <td style="text-align:center">${r.efficiency_pct!=null?`<span style="font-weight:600;color:${effC}">${r.efficiency_pct}%</span>`:'-'}</td>
    </tr>`;
  }).join('');
}

// ── EXPORT EXCEL ──
window.exportExcel = function() {
  const rows=activeTab==='session'?allSessions:allLogs;
  if (!rows.length) return alert('Tidak ada data');
  let headers,data;
  if (activeTab==='session') {
    headers=['No','Waktu Mulai','Mesin','Operator','Produk','Layer','Jumlah','Target','Progress(%)','Durasi(mnt)','Downtime(dtk)','Efisiensi(%)','Status'];
    data=rows.map((r,i)=>{
      const cnt=r.count||0,tgt=r.target||0;
      const pct=tgt>0?Math.min(100,Math.round((cnt/tgt)*100)):0;
      const dur=calcDur(r);
      return[rows.length-i,formatDateTime(r.started_at),r.machine_code||'-',r.operator_name||'-',
             r.product_name||'-',r.layers||1,cnt,tgt,pct,dur?Math.round(dur/60):'-',
             r.downtime_sec||0,r.efficiency_pct||'-',
             tgt>0&&cnt>=tgt?'Complete':(r.status||'-')];
    });
  } else {
    headers=['No','Waktu','Mesin','Sesi ID','Jumlah','Elapsed(dtk)','Downtime(dtk)','Efisiensi(%)'];
    data=rows.map((r,i)=>[rows.length-i,formatDateTime(r.timestamp),
      r.machine_code||'-',r.session_id||'-',parseInt(r.count)||0,
      r.elapsed_sec||0,r.downtime_sec||0,r.efficiency_pct||'-']);
  }
  const csv=[headers,...data].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`fuboru_${activeTab}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
};

// ── EXPORT PDF ──
window.exportPDF = function() {
  const rows=activeTab==='session'?allSessions:allLogs;
  if (!rows.length) return alert('Tidak ada data');
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const machine=document.getElementById('fMachine').options[document.getElementById('fMachine').selectedIndex].text;
  const totalCount=rows.reduce((s,r)=>s+(parseInt(r.count)||0),0);
  const avgEff=rows.length?Math.round(rows.reduce((s,r)=>s+(r.efficiency_pct||0),0)/rows.length):0;

  let thead,tbody;
  if (activeTab==='session') {
    thead=`<tr><th>#</th><th>Waktu Mulai</th><th>Mesin</th><th>Operator</th><th>Produk</th><th>Jumlah</th><th>Target</th><th>Progress</th><th>Durasi</th><th>Efisiensi</th><th>Status</th></tr>`;
    tbody=rows.map((r,i)=>{
      const cnt=r.count||0,tgt=r.target||0;
      const pct=tgt>0?Math.min(100,Math.round((cnt/tgt)*100)):0;
      const isComp=tgt>0&&cnt>=tgt;
      const dur=calcDur(r);
      const bg=isComp?'#F0FDF4':i%2===0?'#fff':'#F9FAFB';
      return `<tr style="background:${bg}">
        <td>${rows.length-i}</td><td>${formatDateTime(r.started_at)}</td>
        <td style="font-weight:700;color:#F97316">${r.machine_code||'-'}</td>
        <td>${r.operator_name||'-'}</td><td>${r.product_name||'-'}</td>
        <td style="font-weight:700">${cnt.toLocaleString()}</td>
        <td>${tgt>0?tgt.toLocaleString():'-'}</td>
        <td style="font-weight:700;color:${isComp?'#16A34A':pct>=60?'#D97706':'#DC2626'}">${pct}%</td>
        <td>${fmtDur(dur)}</td>
        <td style="font-weight:700;color:${(r.efficiency_pct||0)>=85?'#16A34A':(r.efficiency_pct||0)>=60?'#D97706':'#DC2626'}">${r.efficiency_pct!=null?r.efficiency_pct+'%':'-'}</td>
        <td style="color:${isComp?'#16A34A':'#374151'};font-weight:600">${isComp?'✓ Complete':(r.status||'-')}</td>
      </tr>`;
    }).join('');
  } else {
    thead=`<tr><th>#</th><th>Waktu</th><th>Mesin</th><th>Jumlah</th><th>Elapsed</th><th>Downtime</th><th>Efisiensi</th></tr>`;
    tbody=rows.map((r,i)=>{
      const bg=i%2===0?'#fff':'#F9FAFB';
      return `<tr style="background:${bg}">
        <td>${rows.length-i}</td><td>${formatDateTime(r.timestamp)}</td>
        <td style="font-weight:700;color:#F97316">${r.machine_code||'-'}</td>
        <td style="font-weight:700">${(parseInt(r.count)||0).toLocaleString()}</td>
        <td>${fmtDur(parseInt(r.elapsed_sec)||0)}</td>
        <td>${fmtDur(parseInt(r.downtime_sec)||0)}</td>
        <td style="font-weight:700;color:${(r.efficiency_pct||0)>=85?'#16A34A':'#DC2626'}">${r.efficiency_pct!=null?r.efficiency_pct+'%':'-'}</td>
      </tr>`;
    }).join('');
  }

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;font-size:11px;color:#111827;padding:20px}
  .hdr{display:flex;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:3px solid #F97316}
  .logo{font-size:22px;font-weight:800;color:#F97316}.logo span{color:#111827}
  .meta{text-align:right;font-size:10px;color:#6B7280;line-height:1.7}
  .summary{display:flex;gap:10px;margin-bottom:16px}
  .sc{flex:1;background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:8px 12px;text-align:center}
