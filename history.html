<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History Log — Fuboru Counter</title>
  <link rel="stylesheet" href="/css/dashboard.css"/>
</head>
<body id="pageBody">
<script type="module">
import {
  db, requireAuth, initSidebar, renderSidebar,
  formatDate, formatDateTime, formatDuration,
  collection, query, where, orderBy, limit, getDocs, Timestamp
} from '/js/firebase.js';

async function init() {
  const user = await requireAuth();
  const params = new URLSearchParams(window.location.search);
  const filterMachine = params.get('machine') || '';

  document.getElementById('pageBody').innerHTML = `
  ${renderSidebar('history', user.role)}
  <div class="main">
    <div class="topbar">
      <h1>History Log</h1>
      <div class="topbar-actions">
        <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)">
          <div class="live-dot" style="background:var(--blue);width:6px;height:6px;border-radius:50%;animation:blink 2s infinite"></div>
          Auto-refresh 30d
        </div>
        <button class="btn btn-secondary" onclick="loadHistory()">↻ Refresh</button>
        <button class="btn btn-secondary" onclick="exportExcel()">Export CSV</button>
      </div>
    </div>
    <div class="page-content">
      <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <div class="form-group" style="margin:0;flex:1;min-width:160px">
          <label>Dari Tanggal</label>
          <input type="date" id="fFrom"/>
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:160px">
          <label>Sampai Tanggal</label>
          <input type="date" id="fTo"/>
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:160px">
          <label>Mesin</label>
          <input type="text" id="fMachine" placeholder="Semua mesin" value="${filterMachine}"/>
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:120px">
          <label>Status</label>
          <select id="fStatus">
            <option value="">Semua</option>
            <option value="completed">Completed</option>
            <option value="incomplete">Incomplete</option>
            <option value="running">Running</option>
          </select>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-primary" onclick="loadHistory()">Cari</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Waktu</th><th>Mesin</th><th>Operator</th><th>Produk</th>
            <th>Layer</th><th>Jumlah</th><th>Target</th><th>Progress</th>
            <th>Durasi</th><th>Downtime</th><th>Efisiensi</th><th>Status</th>
          </tr></thead>
          <tbody id="histBody"><tr><td colspan="12" style="text-align:center;padding:40px;color:var(--text3)">Memuat...</td></tr></tbody>
        </table>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:12px;text-align:right" id="histCount"></div>
    </div>
  </div>`;

  initSidebar(user);

  // Set default tanggal
  const today = new Date().toISOString().split('T')[0];
  const week  = new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  document.getElementById('fFrom').value = week;
  document.getElementById('fTo').value   = today;

  // Auto-load langsung saat buka halaman
  await loadHistory();

  // Auto-refresh tiap 30 detik (untuk update sesi running)
  setInterval(() => {
    loadHistory(true); // silent = tidak tampilkan loading
  }, 30000);
}

window.loadHistory = async function(silent = false) {
  const from    = document.getElementById('fFrom').value;
  const to      = document.getElementById('fTo').value;
  const machine = document.getElementById('fMachine').value.trim().toUpperCase();
  const status  = document.getElementById('fStatus').value;
  const tbody   = document.getElementById('histBody');

  if (!silent) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text3)">Memuat...</td></tr>`;
  }

  let rows = [];
  try {
    // Query utama: pakai started_at range
    let q = query(collection(db,'sessions'), orderBy('started_at','desc'), limit(200));
    if (from) {
      q = query(
        collection(db,'sessions'),
        where('started_at','>=', new Date(from)),
        orderBy('started_at','desc'),
        limit(200)
      );
    }
    const snap = await getDocs(q);
    rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) {
    // Fallback: ambil semua tanpa filter date (kalau index belum dibuat)
    console.warn('[history] Query index error, fallback:', e.message);
    try {
      const snap2 = await getDocs(query(collection(db,'sessions'), limit(200)));
      rows = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e2) {
      console.error('[history] Fallback query gagal:', e2);
    }
  }

  // Filter client-side
  if (to)      rows = rows.filter(r => !r.started_at || r.started_at?.toDate() <= new Date(to+'T23:59:59'));
  if (from)    rows = rows.filter(r => !r.started_at || r.started_at?.toDate() >= new Date(from));
  if (machine) rows = rows.filter(r => r.machine_code === machine);
  if (status)  rows = rows.filter(r => r.status === status);

  // Sort: terbaru di atas (kalau started_at ada), yang tidak ada di bawah
  rows.sort((a, b) => {
    const ta = a.started_at?.toDate?.() || new Date(0);
    const tb = b.started_at?.toDate?.() || new Date(0);
    return tb - ta;
  });

  // Update info baris + waktu refresh
  const now = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('histCount').innerHTML =
    `${rows.length} sesi ditemukan &nbsp;·&nbsp; <span style="color:var(--text3)">Update: ${now}</span>`;

  if (!rows.length) {
    tbody.innerHTML=`<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--text3)">Tidak ada data</td></tr>`;
    return;
  }

  // Helper format downtime
  function fmtDowntime(sec) {
    if (!sec || sec <= 0) return '<span style="color:var(--text3)">-</span>';
    const m = Math.floor(sec / 60), s = sec % 60;
    if (m >= 60) return `${Math.floor(m/60)}j ${m%60}m`;
    if (m > 0)   return `${m}m ${s}d`;
    return `${s}d`;
  }

  // Helper efisiensi dengan warna
  function fmtEff(pct) {
    if (pct == null || pct === undefined) return '-';
    const color = pct >= 85 ? 'var(--green)' : pct >= 60 ? 'var(--orange)' : 'var(--red)';
    return `<span style="font-weight:600;color:${color}">${pct}%</span>`;
  }

  tbody.innerHTML = rows.map(r => {
    const pct = r.target > 0 ? Math.min(100, Math.round(((r.count||0)/r.target)*100)) : 0;
    const fc  = pct>=100 ? 'var(--green)' : pct>=60 ? 'var(--orange)' : 'var(--red)';
    const dur = r.finished_at && r.started_at
      ? Math.floor((r.finished_at.toDate() - r.started_at.toDate()) / 1000)
      : null;
    const stMap = {
      completed: `<span class="badge badge-green">Completed</span>`,
      incomplete:`<span class="badge badge-orange">Incomplete</span>`,
      running:   `<span class="badge badge-blue">Running</span>`,
      idle:      `<span class="badge badge-orange">Idle</span>`
    };
    const rowStyle = r.status === 'running' ? 'background:rgba(59,130,246,0.05)'
                   : r.status === 'idle'    ? 'background:rgba(234,179,8,0.04)' : '';
    return `<tr style="${rowStyle}">
      <td style="font-size:12px">${formatDateTime(r.started_at)}</td>
      <td><code style="color:var(--orange);font-size:11px">${r.machine_code||'-'}</code></td>
      <td>${r.operator_name||'-'}</td>
      <td>${r.product_name||'-'}</td>
      <td style="text-align:center">${r.layers||1}</td>
      <td class="name">${(r.count||0).toLocaleString()}</td>
      <td>${(r.target||0).toLocaleString()}</td>
      <td><div style="display:flex;align-items:center;gap:6px;min-width:90px">
        <div class="progress-bar" style="flex:1">
          <div class="progress-fill" style="width:${pct}%;background:${fc}"></div>
        </div>
        <span style="font-size:11px;color:${fc};width:32px">${pct}%</span>
      </div></td>
      <td style="font-size:12px">${dur ? formatDuration(dur) : r.status==='running'||r.status==='idle' ? '<span style="color:var(--blue)">Berjalan</span>' : '-'}</td>
      <td style="font-size:12px">${fmtDowntime(r.downtime_sec)}</td>
      <td style="font-size:12px;text-align:center">${fmtEff(r.efficiency_pct)}</td>
      <td>${stMap[r.status]||r.status}</td>
    </tr>`;
  }).join('');
};

window.exportExcel = function() {
  const rows = [];
  document.querySelectorAll('#histBody tr').forEach(tr => {
    rows.push(Array.from(tr.querySelectorAll('td')).map(td=>td.innerText));
  });
  const headers = ['Waktu','Mesin','Operator','Produk','Layer','Jumlah','Target','Progress','Durasi','Downtime','Efisiensi','Status'];
  const csv = [headers, ...rows].map(r=>r.join(',')).join('\n');
  const a   = document.createElement('a');
  a.href    = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download= `history_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
};

init();
</script>
</body>
</html>
