<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History Log — Fuboru Counter</title>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <style>
    .filter-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:flex-end; }
    .filter-bar .form-group { margin:0; flex:1; min-width:140px; }
    .btn-pdf  { background:#EF4444!important; color:#fff!important; }
    .btn-pdf:hover  { background:#DC2626!important; }
    .btn-xlsx { background:#16A34A!important; color:#fff!important; }
    .btn-xlsx:hover { background:#15803D!important; }
    .badge-complete { background:rgba(34,197,94,0.15)!important; color:#22C55E!important; border:1px solid rgba(34,197,94,0.3)!important; }
    .pct-complete { animation: pulse-green 1.5s ease-in-out infinite; }
    @keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:.5} }
    th { white-space:nowrap; }
  </style>
</head>
<body id="pageBody">
<script type="module">
import {
  db, requireAuth, initSidebar, renderSidebar,
  formatDateTime,
  collection, query, where, orderBy, limit, getDocs
} from '/js/firebase.js';

let allRows  = [];

async function init() {
  const user = await requireAuth();
  const params = new URLSearchParams(window.location.search);
  const filterMachine = params.get('machine') || '';

  document.getElementById('pageBody').innerHTML = `
  ${renderSidebar('history', user.role)}
  <div class="main">
    <div class="topbar">
      <h1>History Log</h1>
      <div class="topbar-actions">
        <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)">
          <div style="background:var(--blue);width:6px;height:6px;border-radius:50%;animation:blink 2s infinite"></div>
          Auto-refresh 30d
        </div>
        <button class="btn btn-secondary" onclick="loadHistory()">↻ Refresh</button>
        <button class="btn btn-xlsx" onclick="exportExcel()">⬇ Excel</button>
        <button class="btn btn-pdf"  onclick="exportPDF()">⬇ PDF</button>
      </div>
    </div>
    <div class="page-content">
      <div class="filter-bar">
        <div class="form-group">
          <label>Dari Tanggal</label>
          <input type="date" id="fFrom"/>
        </div>
        <div class="form-group">
          <label>Sampai Tanggal</label>
          <input type="date" id="fTo"/>
        </div>
        <div class="form-group">
          <label>Mesin</label>
          <select id="fMachine">
            <option value="">Semua Mesin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="">Semua</option>
            <option value="complete">Complete</option>
            <option value="running">Running</option>
            <option value="idle">Idle</option>
          </select>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-primary" onclick="loadHistory()">Cari</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="histTable">
          <thead><tr>
            <th>#</th>
            <th>Waktu Mulai</th>
            <th>Mesin</th>
            <th>Operator</th>
            <th>Produk</th>
            <th>Layer</th>
            <th>Jumlah</th>
            <th>Target</th>
            <th>Progress</th>
            <th>Durasi</th>
            <th>Downtime</th>
            <th>Efisiensi</th>
            <th>Status</th>
          </tr></thead>
          <tbody id="histBody">
            <tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text3)">Memuat...</td></tr>
          </tbody>
        </table>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:12px;display:flex;justify-content:space-between">
        <span id="histCount"></span>
        <span id="histRefresh"></span>
      </div>
    </div>
  </div>` + document.getElementById('pageBody').innerHTML;

  initSidebar(user);

  const today = new Date().toISOString().split('T')[0];
  const week  = new Date(Date.now() - 30*86400000).toISOString().split('T')[0];
  document.getElementById('fFrom').value = week;
  document.getElementById('fTo').value   = today;

  await loadMachineOptions(filterMachine);
  await loadHistory();

  setInterval(() => loadHistory(true), 30000);
}

async function loadMachineOptions(preselect='') {
  try {
    const snap = await getDocs(collection(db, 'machines'));
    const sel  = document.getElementById('fMachine');
    snap.docs.forEach(d => {
      const m   = d.data();
      const opt = document.createElement('option');
      opt.value = m.machine_code || d.id;
      opt.textContent = `${m.machine_name||d.id} (${m.machine_code||d.id})`;
      if (opt.value === preselect) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch(e) { console.warn('loadMachineOptions:', e); }
}

window.loadHistory = async function(silent=false) {
  const from    = document.getElementById('fFrom').value;
  const to      = document.getElementById('fTo').value;
  const machine = document.getElementById('fMachine').value;
  const status  = document.getElementById('fStatus').value;
  const tbody   = document.getElementById('histBody');

  if (!silent)
    tbody.innerHTML = `<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text3)">Memuat...</td></tr>`;

  let rows = [];
  try {
    let q = query(collection(db,'sessions'), orderBy('started_at','desc'), limit(300));
    if (from)
      q = query(collection(db,'sessions'), where('started_at','>=',new Date(from)), orderBy('started_at','desc'), limit(300));
    const snap = await getDocs(q);
    rows = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  } catch(e) {
    console.warn('fallback:', e.message);
    try {
      const s2 = await getDocs(query(collection(db,'sessions'), limit(300)));
      rows = s2.docs.map(d => ({ id:d.id, ...d.data() }));
    } catch(e2) { console.error(e2); }
  }

  // Filter
  if (to)      rows = rows.filter(r => !r.started_at || r.started_at?.toDate() <= new Date(to+'T23:59:59'));
  if (from)    rows = rows.filter(r => !r.started_at || r.started_at?.toDate() >= new Date(from));
  if (machine) rows = rows.filter(r => (r.machine_code||r.id) === machine);
  if (status === 'complete') {
    rows = rows.filter(r => r.target > 0 && (r.count||0) >= r.target);
  } else if (status) {
    rows = rows.filter(r => r.status === status);
  }

  rows.sort((a,b) => (b.started_at?.toDate?.() || new Date(0)) - (a.started_at?.toDate?.() || new Date(0)));
  allRows = rows;
  renderTable(rows);

  const now = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('histCount').textContent   = `${rows.length} sesi ditemukan`;
  document.getElementById('histRefresh').textContent = `Update: ${now}`;
};

function calcDurSec(r) {
  if (!r.started_at) return null;
  const s = r.started_at.toDate ? r.started_at.toDate() : new Date(r.started_at);
  const e = r.finished_at ? (r.finished_at.toDate ? r.finished_at.toDate() : new Date(r.finished_at)) : new Date();
  return Math.max(0, Math.floor((e - s) / 1000));
}

function fmtDur(sec) {
  if (!sec || sec <= 0) return '-';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h > 0) return `${h}j ${m}m`;
  if (m > 0) return `${m}m ${s}d`;
  return `${s}d`;
}

function fmtDowntime(sec) {
  if (!sec || sec <= 0) return '<span style="color:var(--text3)">-</span>';
  return fmtDur(sec);
}

function fmtEff(pct) {
  if (pct == null) return '-';
  const c = pct>=85?'var(--green)':pct>=60?'var(--orange)':'var(--red)';
  return `<span style="font-weight:600;color:${c}">${pct}%</span>`;
}

function renderTable(rows) {
  const tbody = document.getElementById('histBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text3)">Tidak ada data</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((r,i) => {
    const count      = r.count  || 0;
    const target     = r.target || 0;
    const pct        = target > 0 ? Math.min(100, Math.round((count/target)*100)) : 0;
    const isComplete = target > 0 && count >= target;
    const isActive   = r.status === 'running' || r.status === 'idle';
    const fc         = isComplete ? 'var(--green)' : pct>=60 ? 'var(--orange)' : 'var(--red)';
    const durSec     = calcDurSec(r);

    let statusBadge;
    if (isComplete)            statusBadge = `<span class="badge badge-complete">✓ Complete</span>`;
    else if (r.status==='running') statusBadge = `<span class="badge badge-blue">Running</span>`;
    else if (r.status==='idle')    statusBadge = `<span class="badge badge-orange">Idle</span>`;
    else                           statusBadge = `<span class="badge badge-gray">${r.status||'-'}</span>`;

    const rowBg = isComplete?'background:rgba(34,197,94,0.04)'
                : r.status==='running'?'background:rgba(59,130,246,0.04)'
                : r.status==='idle'?'background:rgba(234,179,8,0.03)':'';

    return `<tr style="${rowBg}">
      <td style="color:var(--text3);font-size:11px">${rows.length-i}</td>
      <td style="font-size:12px">${formatDateTime(r.started_at)}</td>
      <td><code style="color:var(--orange);font-size:11px">${r.machine_code||'-'}</code></td>
      <td>${r.operator_name||'-'}</td>
      <td>${r.product_name||'-'}</td>
      <td style="text-align:center">${r.layers||1}</td>
      <td style="font-weight:700">${count.toLocaleString()}</td>
      <td>${target>0?target.toLocaleString():'-'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;min-width:100px">
          <div class="progress-bar" style="flex:1">
            <div class="progress-fill ${isComplete?'pct-complete':''}" style="width:${pct}%;background:${fc}"></div>
          </div>
          <span style="font-size:11px;color:${fc};width:34px;font-weight:600">${pct}%</span>
        </div>
      </td>
      <td style="font-size:12px">
        ${fmtDur(durSec)}
        ${isActive?'<br><span style="font-size:10px;color:var(--blue)">● Berjalan</span>':''}
      </td>
      <td style="font-size:12px">${fmtDowntime(r.downtime_sec)}</td>
      <td style="font-size:12px;text-align:center">${fmtEff(r.efficiency_pct)}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

// ── EXPORT EXCEL (CSV UTF-8 BOM) ──
window.exportExcel = function() {
  if (!allRows.length) return alert('Tidak ada data');
  const headers = ['No','Waktu Mulai','Mesin','Operator','Produk','Layer',
                   'Jumlah','Target','Progress(%)','Durasi(menit)',
                   'Downtime(detik)','Efisiensi(%)','Status'];
  const data = allRows.map((r,i) => {
    const count  = r.count||0, target = r.target||0;
    const pct    = target>0 ? Math.min(100,Math.round((count/target)*100)) : 0;
    const isComp = target>0 && count>=target;
    const dur    = calcDurSec(r);
    const start  = r.started_at?.toDate ? r.started_at.toDate().toLocaleString('id-ID') : '-';
    return [allRows.length-i, start, r.machine_code||'-', r.operator_name||'-',
            r.product_name||'-', r.layers||1, count, target, pct,
            dur?Math.round(dur/60):'-', r.downtime_sec||0, r.efficiency_pct||'-',
            isComp?'Complete':(r.status||'-')];
  });
  const csv = [headers,...data].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `history_fuboru_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
};

// ── EXPORT PDF (print preview) ──
window.exportPDF = function() {
  if (!allRows.length) return alert('Tidak ada data');
  const from    = document.getElementById('fFrom').value;
  const to      = document.getElementById('fTo').value;
  const machine = document.getElementById('fMachine').options[document.getElementById('fMachine').selectedIndex].text;

  const rows = allRows;
  const totalCount = rows.reduce((s,r)=>s+(r.count||0),0);
  const avgEff     = rows.length ? Math.round(rows.reduce((s,r)=>s+(r.efficiency_pct||0),0)/rows.length) : 0;
  const completeN  = rows.filter(r=>r.target>0&&(r.count||0)>=r.target).length;

  const tableRows = rows.map((r,i) => {
    const count=r.count||0, target=r.target||0;
    const pct   = target>0?Math.min(100,Math.round((count/target)*100)):0;
    const isComp = target>0&&count>=target;
    const dur   = calcDurSec(r);
    const start = r.started_at?.toDate?r.started_at.toDate().toLocaleString('id-ID'):'-';
    const effC  = (r.efficiency_pct||0)>=85?'#16A34A':(r.efficiency_pct||0)>=60?'#D97706':'#DC2626';
    const pctC  = isComp?'#16A34A':pct>=60?'#D97706':'#DC2626';
    const bg    = isComp?'#F0FDF4':i%2===0?'#fff':'#F9FAFB';
    const status= isComp?'✓ Complete':(r.status||'-');
    return `<tr style="background:${bg}">
      <td style="text-align:center;color:#9CA3AF;font-size:10px">${rows.length-i}</td>
      <td style="font-size:10px">${start}</td>
      <td style="font-weight:700;color:#F97316">${r.machine_code||'-'}</td>
      <td>${r.operator_name||'-'}</td>
      <td>${r.product_name||'-'}</td>
      <td style="text-align:center">${r.layers||1}</td>
      <td style="text-align:right;font-weight:700">${count.toLocaleString()}</td>
      <td style="text-align:right">${target>0?target.toLocaleString():'-'}</td>
      <td style="text-align:center;font-weight:700;color:${pctC}">${pct}%</td>
      <td style="text-align:center">${fmtDur(dur)}</td>
      <td style="text-align:center">${r.downtime_sec?fmtDur(r.downtime_sec):'-'}</td>
      <td style="text-align:center;font-weight:700;color:${effC}">${r.efficiency_pct!=null?r.efficiency_pct+'%':'-'}</td>
      <td style="text-align:center;font-weight:600;color:${isComp?'#16A34A':'#374151'}">${status}</td>
    </tr>`;
  }).join('');

  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <title>History Log — Fuboru Counter</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#111827;padding:24px}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid #F97316}
    .logo{font-size:24px;font-weight:800;color:#F97316;letter-spacing:-0.5px}
    .logo span{color:#111827}
    .meta{text-align:right;font-size:11px;color:#6B7280;line-height:1.6}
    .summary{display:flex;gap:12px;margin-bottom:20px}
    .sum-card{flex:1;background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:10px 14px;text-align:center}
    .sum-card .val{font-size:20px;font-weight:800;color:#F97316}
    .sum-card .lbl{font-size:10px;color:#9A3412;margin-top:2px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead{background:#F97316;color:#fff}
    thead th{padding:7px 5px;text-align:left;white-space:nowrap;font-size:10px}
    tbody td{padding:5px 5px;border-bottom:1px solid #F3F4F6;font-size:11px}
    .footer{margin-top:20px;text-align:center;font-size:10px;color:#9CA3AF;border-top:1px solid #E5E7EB;padding-top:10px}
    @media print{@page{size:A4 landscape;margin:15mm}}
  </style></head><body>
  <div class="header">
    <div>
      <div class="logo">Fuboru <span>Counter</span></div>
      <div style="font-size:12px;color:#6B7280;margin-top:4px">Laporan History Produksi</div>
    </div>
    <div class="meta">
      <div><strong>Periode:</strong> ${from||'-'} s/d ${to||'-'}</div>
      <div><strong>Mesin:</strong> ${machine||'Semua'}</div>
      <div><strong>Dicetak:</strong> ${new Date().toLocaleString('id-ID')}</div>
    </div>
  </div>
  <div class="summary">
    <div class="sum-card"><div class="val">${rows.length}</div><div class="lbl">Total Sesi</div></div>
    <div class="sum-card"><div class="val">${completeN}</div><div class="lbl">Complete</div></div>
    <div class="sum-card"><div class="val">${totalCount.toLocaleString()}</div><div class="lbl">Total Produksi</div></div>
    <div class="sum-card"><div class="val">${avgEff}%</div><div class="lbl">Rata-rata Efisiensi</div></div>
  </div>
  <table>
    <thead><tr>
      <th>#</th><th>Waktu Mulai</th><th>Mesin</th><th>Operator</th><th>Produk</th>
      <th>Layer</th><th>Jumlah</th><th>Target</th><th>Progress</th>
      <th>Durasi</th><th>Downtime</th><th>Efisiensi</th><th>Status</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
  <div class="footer">© ${new Date().getFullYear()} PT. Fuboru Indonesia · Dokumen dibuat otomatis oleh sistem Fuboru Counter</div>
  <script>window.onload=()=>window.print()<\/script>
  </body></html>`);
  win.document.close();
};

init();
</script>
</body>
</html>
