<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Counter — Fuboru Counter</title>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <style>
    .machine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .machine-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .machine-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .machine-card .status-bar {
      position: absolute; left:0; top:0; bottom:0; width:4px;
    }
    .machine-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 16px;
    }
    .machine-code {
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 700;
    }
    .machine-loc { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .machine-count {
      font-family: 'Syne', sans-serif;
      font-size: 36px; font-weight: 800;
      line-height: 1; margin-bottom: 4px;
      transition: color 0.3s;
    }
    .machine-info {
      font-size: 12px; color: var(--text3);
      margin-bottom: 12px;
    }
    .machine-info span { color: var(--text2); }
    .live-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      color: var(--green); padding: 3px 8px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .live-pill .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.2s ease-in-out infinite;
    }
    .stats-row {
      display: flex; gap: 16px;
      margin-bottom: 20px;
    }
    .stat-chip {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      flex: 1; text-align: center;
    }
    .stat-chip .val {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 700; color: var(--text);
    }
    .stat-chip .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  </style>
</head>
<body id="pageBody">
<script type="module">
import {
  db, requireAuth, initSidebar, renderSidebar,
  showToast, formatDateTime, timeAgo,
  collection, query, orderBy, onSnapshot, doc
} from '/js/firebase.js';

async function init() {
  const user = await requireAuth();

  // Render sidebar
  document.getElementById('pageBody').innerHTML = `
  ${renderSidebar('index', user.role)}
  <div class="main">
    <div class="topbar">
      <h1>Live Counter</h1>
      <div class="topbar-actions">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green)">
          <div class="live-dot" style="background:var(--green);width:7px;height:7px;border-radius:50%"></div>
          Realtime
        </div>
        <span id="clockDisplay" style="font-family:'Syne',sans-serif;font-size:13px;color:var(--text2)"></span>
      </div>
    </div>
    <div class="page-content">
      <div class="stats-row" id="statsRow">
        <div class="stat-chip"><div class="val" id="statTotal">-</div><div class="lbl">Total Mesin</div></div>
        <div class="stat-chip"><div class="val" style="color:var(--green)" id="statRunning">-</div><div class="lbl">Running</div></div>
        <div class="stat-chip"><div class="val" style="color:var(--yellow)" id="statIdle">-</div><div class="lbl">Idle</div></div>
        <div class="stat-chip"><div class="val" style="color:var(--text3)" id="statOffline">-</div><div class="lbl">Offline</div></div>
      </div>
      <div class="machine-grid" id="machineGrid">
        <div style="color:var(--text3);font-size:13px;padding:40px;text-align:center;grid-column:1/-1">Memuat...</div>
      </div>
    </div>
  </div>` + document.getElementById('pageBody').innerHTML;

  initSidebar(user);
  startClock();

  // ── Realtime listener ke machine_status ──
  const q = query(collection(db, 'machine_status'), orderBy('machine_code'));
  onSnapshot(q, (snap) => {
    const machines = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window._lastMachines = machines;
    renderMachines(machines);
    updateStats(machines);
  });
}

function startClock() {
  setInterval(() => {
    document.getElementById('clockDisplay').textContent =
      new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }, 1000);
}

const STATUS_COLOR = { running:'#22C55E', idle:'#EAB308', stopped:'#EF4444', offline:'#475569' };

// Dashboard hanya deteksi offline kalau last_seen > 15 detik (3x missed heartbeat)
// Status running/idle sudah dikirim langsung dari ESP
const OFFLINE_THRESHOLD_MS = 15 * 1000;

function resolveStatus(m) {
  // Cek last_seen — kalau > 15 detik tidak ada heartbeat → ESP mati → offline
  if (m.last_seen) {
    const ls = m.last_seen.toDate ? m.last_seen.toDate() : new Date(m.last_seen);
    if (Date.now() - ls.getTime() > OFFLINE_THRESHOLD_MS) return 'offline';
  } else {
    return 'offline';
  }
  // Heartbeat masih fresh → percaya status dari Firestore (running/idle)
  return m.status || 'offline';
}

function renderMachines(machines) {
  const grid = document.getElementById('machineGrid');
  if (!machines.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>Belum ada mesin terdaftar</p></div>`;
    return;
  }
  grid.innerHTML = machines.map(m => {
    const status    = resolveStatus(m);  // pakai resolveStatus, bukan m.status langsung
    const color     = STATUS_COLOR[status] || STATUS_COLOR.offline;
    const count     = m.count  || 0;
    const target    = m.target || 0;
    const pct       = target > 0 ? Math.min(100, Math.round((count/target)*100)) : 0;
    const fillColor = pct>=100 ? 'var(--green)' : pct>=60 ? 'var(--orange)' : 'var(--red)';
    const statusLabel = { running:'Running', idle:'Idle', stopped:'Stop', offline:'Offline' };

    // last_seen tetap tampil kapan terakhir update, meskipun status sudah offline
    let lastSeenText = '-';
    if (m.last_seen) {
      const ls   = m.last_seen.toDate ? m.last_seen.toDate() : new Date(m.last_seen);
      const diff = Math.floor((Date.now() - ls.getTime()) / 1000);
      if (diff < 60)        lastSeenText = `${diff}d lalu`;
      else if (diff < 3600) lastSeenText = `${Math.floor(diff/60)}m lalu`;
      else                  lastSeenText = `${Math.floor(diff/3600)}j lalu`;
    }

    return `
    <div class="machine-card" onclick="window.location.href='/machine-detail.html?code=${m.machine_code||m.id}'">
      <div class="status-bar" style="background:${color}"></div>
      <div class="machine-card-header">
        <div>
          <div class="machine-code">${m.machine_name || m.id}</div>
          <div class="machine-loc">${m.location || '-'} · <code style="color:var(--orange);font-size:11px">${m.machine_code||m.id}</code></div>
        </div>
        ${status==='running'
          ? `<div class="live-pill"><div class="dot"></div>LIVE</div>`
          : `<span class="badge ${status==='idle'?'badge-orange':status==='stopped'?'badge-red':'badge-gray'}">${statusLabel[status]||status}</span>`
        }
      </div>

      <div class="machine-count" style="color:${color}">${count.toLocaleString()}</div>
      <div class="machine-info">
        ${m.operator_name ? `<span>${m.operator_name}</span>` : 'Tidak ada operator'}
        ${m.product_name  ? ` · <span>${m.product_name}</span>` : ''}
        ${m.layers > 1    ? ` · <span>${m.layers} layer</span>` : ''}
      </div>

      ${target > 0 ? `
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:5px">
          <span>Progress</span>
          <span style="color:${fillColor};font-weight:600">${pct}% · sisa ${(target-count).toLocaleString()}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
      </div>` : ''}

      <div style="font-size:11px;color:var(--text3);margin-top:8px">
        Last seen: <span>${lastSeenText}</span>
      </div>
    </div>`;
  }).join('');
}

function updateStats(machines) {
  const resolved = machines.map(m => resolveStatus(m));
  document.getElementById('statTotal').textContent   = machines.length;
  document.getElementById('statRunning').textContent = resolved.filter(s=>s==='running').length;
  document.getElementById('statIdle').textContent    = resolved.filter(s=>s==='idle').length;
  document.getElementById('statOffline').textContent = resolved.filter(s=>s==='offline'||s==='stopped').length;
}

// Re-render tiap 30 detik untuk update last_seen display
setInterval(() => {
  window._lastMachines && renderMachines(window._lastMachines) && updateStats(window._lastMachines);
}, 30000);

init();
</script>
</body>
</html>
