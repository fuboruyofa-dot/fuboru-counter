<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produk &amp; Target — Fuboru Counter</title>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <style>
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg2, #1e1e1e); border-radius: 14px;
      padding: 28px; width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px; }
    .modal-title  { font-family:'Syne',sans-serif;font-size:16px;font-weight:700; }
    .modal-close  { background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);line-height:1;padding:4px 8px; }
    .modal-close:hover { color:var(--text1); }
    .form-group   { margin-bottom:14px; }
    .form-group label { display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text2); }
    .form-group input,
    .form-group select {
      width:100%; box-sizing:border-box;
      background:var(--bg3); border:1px solid var(--border2);
      border-radius:8px; padding:10px 12px;
      font-size:14px; color:var(--text1);
    }
    .form-group select option { background:var(--bg2); }
    .form-row { display:flex; gap:12px; }
    .form-row .form-group { flex:1; }
    .badge-machine {
      display:inline-block; padding:2px 8px; border-radius:6px;
      font-size:11px; font-weight:700; letter-spacing:.5px;
      background:rgba(99,102,241,.18); color:#818cf8;
    }
    .machines-wrap {
      display:flex; flex-wrap:wrap; gap:6px; margin-top:4px;
    }
    .machine-chip {
      display:inline-flex; align-items:center; gap:4px;
      padding:4px 10px; border-radius:20px; font-size:12px;
      background:var(--bg3); border:1px solid var(--border2);
      cursor:pointer; user-select:none; transition:all .15s;
    }
    .machine-chip.selected {
      background:rgba(99,102,241,.25); border-color:#818cf8; color:#c7d2fe;
    }
    .machine-chip:hover { border-color:#818cf8; }
    /* [FIX] target hint */
    .target-hint {
      font-size:11px; color:var(--text3); margin-top:4px;
    }
    .target-hint span { color: #f59e0b; font-weight:600; }
  </style>
</head>
<body id="pageBody">
<script type="module">
import {
  db, requireAdmin, initSidebar, renderSidebar,
  showToast, formatDate,
  collection, doc, getDocs, getDoc, addDoc, updateDoc, deleteDoc,
  query, orderBy, where, serverTimestamp
} from '/js/firebase.js';

const MACHINE_LIST = [
  { code: 'KEMAS',   label: 'Mesin Kemas' },
  { code: 'PRESS 1', label: 'Mesin Plong 1' },
  { code: 'PRESS 2',   label: 'Mesin Plong 2' },
  { code: 'SYSCO',    label: 'Mesin Sysco' },
];

function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
window.openModal  = openModal;
window.closeModal = closeModal;

let selectedMachines = [];

function renderMachineChips(containerId, currentCodes = []) {
  selectedMachines = [...currentCodes];
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = MACHINE_LIST.map(m => `
    <div class="machine-chip ${selectedMachines.includes(m.code) ? 'selected' : ''}"
         data-code="${m.code}" onclick="toggleMachineChip(this,'${m.code}')">
      ${m.label}
    </div>`).join('');
}
window.toggleMachineChip = function(el, code) {
  if (selectedMachines.includes(code)) {
    selectedMachines = selectedMachines.filter(c => c !== code);
    el.classList.remove('selected');
  } else {
    selectedMachines.push(code);
    el.classList.add('selected');
  }
};

async function init() {
  const user = await requireAdmin();
  document.getElementById('pageBody').innerHTML = `
  ${renderSidebar('products', user.role)}
  <div class="main">
    <div class="topbar">
      <h1>Produk &amp; Target</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openAdd()">+ Tambah Produk</button>
      </div>
    </div>
    <div class="page-content">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nama Produk</th>
              <th>Target Saat Ini</th>
              <th>Mesin</th>
              <th>Deskripsi</th>
              <th>Status</th>
              <th>Dibuat</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="prodBody">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">Memuat...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal add/edit -->
  <div class="modal-overlay" id="modalProd">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="prodModalTitle">Tambah Produk</span>
        <button class="modal-close" onclick="closeModal('modalProd')">✕</button>
      </div>
      <div class="form-group">
        <label>Nama Produk</label>
        <input type="text" id="prodName" placeholder="Nama produk"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Target / Sisa Produksi</label>
          <input type="number" id="prodTarget" placeholder="200" min="0"/>
          <div class="target-hint" id="targetHint" style="display:none">
            Target terkini di Firestore: <span id="targetLive">-</span> pcs
          </div>
        </div>
        <div class="form-group">
          <label>Layer / Lapisan</label>
          <input type="number" id="prodLayers" placeholder="1" min="1" value="1"/>
        </div>
      </div>
      <div class="form-group">
        <label>Area Produksi (Mesin)</label>
        <div class="machines-wrap" id="machineChips"></div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">
          Pilih satu atau lebih mesin.
        </div>
      </div>
      <div class="form-group">
        <label>Deskripsi (opsional)</label>
        <input type="text" id="prodDesc" placeholder="Keterangan produk"/>
      </div>
      <input type="hidden" id="prodDocId"/>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal('modalProd')">Batal</button>
        <button class="btn btn-primary"   style="flex:1" onclick="saveProd()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal konfirmasi hapus -->
  <div class="modal-overlay" id="modalDelete">
    <div class="modal" style="max-width:360px;text-align:center">
      <div style="font-size:32px;margin-bottom:12px">🗑️</div>
      <div class="modal-title" style="margin-bottom:8px">Hapus Produk?</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:20px" id="deleteMsg">Data akan dihapus permanen.</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal('modalDelete')">Batal</button>
        <button class="btn btn-danger"    style="flex:1" id="confirmDeleteBtn">Hapus</button>
      </div>
    </div>
  </div>`;

  ['modalProd','modalDelete'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal(id);
    });
  });

  initSidebar(user);
  loadProducts();
}

window.openAdd = function() {
  document.getElementById('prodModalTitle').textContent = 'Tambah Produk';
  ['prodDocId','prodName','prodDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('prodTarget').value = '';
  document.getElementById('prodLayers').value = '1';
  document.getElementById('targetHint').style.display = 'none';
  renderMachineChips('machineChips', []);
  openModal('modalProd');
};

// [FIX] editProd: re-fetch dokumen dari Firestore untuk dapat target terkini
window.editProd = async function(id) {
  document.getElementById('prodModalTitle').textContent = 'Edit Produk';
  document.getElementById('prodDocId').value = id;
  document.getElementById('prodTarget').value = '';
  document.getElementById('targetHint').style.display = 'none';
  openModal('modalProd');

  try {
    // GET dokumen terkini langsung dari Firestore (bukan dari cache lokal)
    const snap = await getDoc(doc(db, 'products', id));
    if (!snap.exists()) { showToast('Produk tidak ditemukan', 'error'); closeModal('modalProd'); return; }
    const data = snap.data();

    document.getElementById('prodName').value   = data.name        || '';
    document.getElementById('prodTarget').value = data.target      ?? '';
    document.getElementById('prodLayers').value = data.layers      || 1;
    document.getElementById('prodDesc').value   = data.description || '';

    // Tampilkan target terkini sebagai hint agar admin tahu nilai real
    document.getElementById('targetLive').textContent = data.target ?? '-';
    document.getElementById('targetHint').style.display = 'block';

    let codes = [];
    if (Array.isArray(data.machine_codes)) codes = data.machine_codes;
    else if (data.machine_code)            codes = [data.machine_code];
    renderMachineChips('machineChips', codes);
  } catch(e) {
    showToast('Gagal fetch data: ' + e.message, 'error');
  }
};

window.saveProd = async function() {
  const id     = document.getElementById('prodDocId').value;
  const name   = document.getElementById('prodName').value.trim();
  const target = parseInt(document.getElementById('prodTarget').value);
  const layers = parseInt(document.getElementById('prodLayers').value) || 1;
  const desc   = document.getElementById('prodDesc').value.trim();

  if (!name)            { showToast('Nama wajib diisi', 'error'); return; }
  if (isNaN(target) || target < 0) { showToast('Target harus angka >= 0', 'error'); return; }
  if (selectedMachines.length === 0) { showToast('Pilih minimal satu mesin', 'error'); return; }

  const body = {
    name,
    target,
    layers,
    description: desc,
    machine_codes: selectedMachines,
    machine_code: selectedMachines[0],
  };

  try {
    if (id) {
      await updateDoc(doc(db, 'products', id), body);
    } else {
      await addDoc(collection(db, 'products'), {
        ...body, is_active: true, created_at: serverTimestamp()
      });
    }
    showToast(id ? 'Produk diupdate!' : 'Produk ditambahkan!');
    closeModal('modalProd');
    loadProducts();
  } catch(e) { showToast(e.message, 'error'); }
};

window.toggleProd = async function(id, active) {
  await updateDoc(doc(db, 'products', id), { is_active: !active });
  showToast(!active ? 'Produk diaktifkan' : 'Produk dinonaktifkan');
  loadProducts();
};

window.confirmDelete = function(id, name) {
  document.getElementById('deleteMsg').textContent =
    `"${name}" akan dihapus permanen dan tidak bisa dikembalikan.`;
  document.getElementById('confirmDeleteBtn').onclick = async () => {
    try {
      await deleteDoc(doc(db, 'products', id));
      showToast(`Produk "${name}" dihapus`);
      closeModal('modalDelete');
      loadProducts();
    } catch(e) { showToast(e.message, 'error'); }
  };
  openModal('modalDelete');
};

function getMachineLabel(codes) {
  if (!codes) return '-';
  const arr = Array.isArray(codes) ? codes : [codes];
  return arr.map(c => {
    const m = MACHINE_LIST.find(x => x.code === c);
    return `<span class="badge-machine">${m ? m.label : c}</span>`;
  }).join(' ');
}

async function loadProducts() {
  // [FIX] Selalu fetch ulang dari server (tidak pakai cache browser)
  const snap  = await getDocs(query(collection(db, 'products'), orderBy('name')));
  const tbody = document.getElementById('prodBody');
  if (snap.empty) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">Belum ada produk</td></tr>`;
    return;
  }
  tbody.innerHTML = snap.docs.map((d, i) => {
    const p = { id: d.id, ...d.data() };
    const machineDisplay = getMachineLabel(p.machine_codes || p.machine_code);
    // Target 0 = habis/selesai
    const targetDisplay = p.target === 0
      ? '<span style="color:#6b7280;font-size:12px">Habis / selesai</span>'
      : `<span style="font-family:\'Syne\',sans-serif;font-weight:700;color:var(--orange)">${p.target}</span> pcs
         ${p.layers > 1 ? `<span style="font-size:11px;color:var(--text3)"> × ${p.layers} layer</span>` : ''}`;

    return `<tr>
      <td style="color:var(--text3)">${i+1}</td>
      <td class="name">${p.name}</td>
      <td>${targetDisplay}</td>
      <td>${machineDisplay}</td>
      <td style="color:var(--text3)">${p.description||'-'}</td>
      <td>${p.is_active
        ? '<span class="badge badge-green">Aktif</span>'
        : '<span class="badge badge-gray">Nonaktif</span>'}</td>
      <td style="font-size:12px;color:var(--text3)">${formatDate(p.created_at)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm" onclick="editProd('${p.id}')">
            Edit
          </button>
          <button class="btn btn-secondary btn-sm"
            onclick="toggleProd('${p.id}',${p.is_active})">
            ${p.is_active ? 'Nonaktifkan' : 'Aktifkan'}
          </button>
          <button class="btn btn-danger btn-sm"
            onclick="confirmDelete('${p.id}','${p.name.replace(/'/g,"\\'")}')">
            Hapus
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

init();
</script>
</body>
</html>
