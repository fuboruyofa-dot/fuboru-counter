<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detail Mesin — Fuboru Counter</title>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    .back-btn { display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:13px;text-decoration:none;margin-bottom:20px;transition:color 0.15s; }
    .back-btn:hover { color:var(--orange); }
    .machine-header { background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px 28px;display:flex;align-items:center;gap:24px;margin-bottom:20px;border-left:4px solid var(--text3); }
    .machine-header-info h2 { font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px; }
    .machine-header-info .meta { font-size:13px;color:var(--text3);display:flex;align-items:center;gap:12px; }
    .header-right { text-align:right;flex-shrink:0; }
    .big-count { font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1; }
    .count-label { font-size:12px;color:var(--text3);margin-top:4px; }
    .detail-grid { display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:20px; }
    .info-card { background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px; }
    .info-card-title { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text3);margin-bottom:14px; }
    .info-row { display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px; }
    .info-row:last-child { border-bottom:none; }
    .info-row .key { color:var(--text3); }
    .info-row .val { color:var(--text);font-weight:500; }
    .info-row .val.hi { font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--orange); }
    .ring-wrap { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px; }
    .ring-container { position:relative;width:150px;height:150px; }
    .ring-container svg { transform:rotate(-90deg); }
    .ring-center { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center; }
    .ring-pct { font-family:'Syne',sans-serif;font-size:26px;font-weight:800; }
    .ring-lbl { font-size:11px;color:var(--text3); }
    .chart-wrap { background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:20px; }
    .recent-wrap { background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:20px; }
    .recent-head { padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  </style>
</head>
<body id="pageBody">
<script type="module">
import {
  db, requireAuth, initSidebar, renderSidebar,
  formatDateTime, formatDuration, timeAgo,
  doc, collection, query, where, orderBy, limit,
  onSnapshot, getDocs
} from '/js/firebase.js';
import { Chart } from 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';

const params      = new URLSearchParams(window.location.search);
const machineCode = params.get('code') || '';
if (!machineCode) window.location.href = '/index.html';

let durationInterval = null;
let sessionStart     = null;
let prodChart        = null;

async function init() {
  const user = await requireAuth();

  document.getElementById('pageBody').innerHTML = `
  ${renderSidebar('index', user.role)}
  <div class="main">
    <div class="topbar">
      <h1 id="topbarTitle">Detail Mesin</h1>
      <div class="topbar-actions">
        <div id="liveBadge" style="display:none;align-items:center;gap:6px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:var(--green);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite"></div>LIVE
        </div>
        <span id="clockDisplay" style="font-family:'Syne',sans-serif;font-size:13px;color:var(--text2)"></span>
      </div>
    </div>
    <div class="page-content">
      <a href="/index.html" class="back-btn">← Kembali ke Live Counter</a>
      <div class="machine-header" id="machineHeader">
        <div class="machine-header-info" style="flex:1">
          <h2 id="machineName">-</h2>
          <div class="meta">
            <span id="machineStatus">-</span>
            <span id="machineLocation" style="color:var(--text3)">-</span>
            <code id="machineCodeEl" style="color:var(--orange);font-size:12px">-</code>
          </div>
        </div>
        <div class="header-right">
          <div class="big-count" id="bigCount">0</div>
          <div class="count-label">pcs diproduksi</div>
        </div>
      </div>
      <div class="detail-grid">
        <div class="info-card ring-wrap">
          <div class="ring-container">
            <svg width="150" height="150" viewBox="0 0 150 150">
              <circle cx="75" cy="75" r="62" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="11"/>
              <circle id="progressRing" cx="75" cy="75" r="62" fill="none" stroke="#F97316" stroke-width="11" stroke-linecap="round"
                stroke-dasharray="389.6" stroke-dashoffset="389.6" style="transition:stroke-dashoffset 0.8s ease,stroke 0.3s"/>
            </svg>
            <div class="ring-center">
              <div class="ring-pct" id="ringPct">0%</div>
              <div class="ring-lbl">Progress</div>
            </div>
          </div>
          <div style="text-align:center">
            <div style="font-size:13px;color:var(--text3)">Target: <span id="targetVal" style="color:var(--text);font-weight:600">-</span></div>
            <div style="font-size:12px;color:var(--text3);margin-top:3px">Sisa: <span id="remainVal" style="color:var(--orange);font-weight:600">-</span></div>
          </div>
        </div>
        <div class="info-card">
          <div class="info-card-title">Informasi Sesi Aktif</div>
          <div class="info-row"><span class="key">Operator</span><span class="val" id="infoOp">-</span></div>
          <div class="info-row"><span class="key">Produk</span><span class="val" id="infoProd">-</span></div>
          <div class="info-row"><span class="key">Layer</span><span class="val" id="infoLayer">-</span></div>
          <div class="info-row"><span class="key">Jumlah / Target</span><span class="val hi" id="infoCount">-</span></div>
          <div class="info-row"><span class="key">Mulai Sesi</span><span class="val" id="infoStart">-</span></div>
          <div class="info-row"><span class="key">Durasi Berjalan</span><span class="val" id="infoDur">-</span></div>
          <div class="info-row"><span class="key">Last Update</span><span class="val" id="infoLast">-</span></div>
        </div>
      </div>
      <div class="chart-wrap">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div>
            <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:600">Riwayat Produksi</div>
            <div style="font-size:12px;color:var(--text3);margin-top:2px">7 hari terakhir</div>
          </div>
        </div>
        <canvas id="prodChart" height="80"></canvas>
      </div>
      <div class="recent-wrap">
        <div class="recent-head">
          <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:600">Sesi Terakhir</div>
          <a href="/history.html?machine=${machineCode}" style="font-size:12px;color:var(--orange);text-decoration:none">Lihat semua →</a>
        </div>
        <table>
          <thead><tr><th>Operator</th><th>Produk</th><th>Layer</th><th>Jumlah</th><th>Target</th><th>Progress</th><th>Durasi</th><th>Status</th></tr></thead>
          <tbody id="recentBody"><tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">Memuat...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>`;

  initSidebar(user);
  setInterval(() => {
    document.getElementById('clockDisplay').textContent =
      new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, 1000);

  // Realtime listener
  onSnapshot(doc(db, 'machine_status', machineCode), (snap) => {
    if (!snap.exists()) return;
    const m = snap.data();
    document.getElementById('topbarTitle').textContent  = m.machine_name || machineCode;
    renderHeader(m);
    renderInfo(m);
    renderRing(m);
  });

  loadRecentSessions();
  loadChartData();
}

function renderHeader(m) {
  const status = m.status || 'offline';
  const colors = { running:'#22C55E', idle:'#EAB308', stopped:'#EF4444', offline:'#475569' };
  const color  = colors[status] || colors.offline;

  document.getElementById('machineHeader').style.borderLeftColor = color;
  document.getElementById('machineName').textContent    = m.machine_name || machineCode;
  document.getElementById('machineLocation').textContent= m.location || '-';
  document.getElementById('machineCodeEl').textContent  = m.machine_code || machineCode;
  document.getElementById('bigCount').textContent       = (m.count||0).toLocaleString();
  document.getElementById('bigCount').style.color       = color;

  const labels = { running:'<span class="badge badge-green">● Running</span>', idle:'<span class="badge badge-orange">● Idle</span>', stopped:'<span class="badge badge-red">● Stop</span>', offline:'<span class="badge badge-gray">● Offline</span>' };
  document.getElementById('machineStatus').innerHTML = labels[status] || labels.offline;

  const lb = document.getElementById('liveBadge');
  lb.style.display = status==='running' ? 'inline-flex' : 'none';
}

function renderInfo(m) {
  document.getElementById('infoOp').textContent    = m.operator_name || '-';
  document.getElementById('infoProd').textContent  = m.product_name  || '-';
  document.getElementById('infoLayer').textContent = m.layers ? `${m.layers} layer` : '-';
  const count = m.count||0, target = m.target||0;
  document.getElementById('infoCount').textContent = target>0 ? `${count.toLocaleString()} / ${target.toLocaleString()}` : count.toLocaleString();
  document.getElementById('infoStart').textContent = m.started_at ? formatDateTime(m.started_at) : '-';
  document.getElementById('infoLast').textContent  = m.last_seen ? timeAgo(m.last_seen) : '-';
  document.getElementById('targetVal').textContent = target>0 ? target.toLocaleString() : '-';
  document.getElementById('remainVal').textContent = target>0 ? Math.max(0,target-count).toLocaleString() : '-';

  if (durationInterval) clearInterval(durationInterval);
  if (m.status==='running' && m.started_at) {
    sessionStart = m.started_at.toDate ? m.started_at.toDate() : new Date(m.started_at);
    updateDuration();
    durationInterval = setInterval(updateDuration, 1000);
  } else {
    document.getElementById('infoDur').textContent = '-';
  }
}

function updateDuration() {
  if (!sessionStart) return;
  const s = Math.floor((Date.now()-sessionStart)/1000);
  document.getElementById('infoDur').textContent = formatDuration(s);
}

function renderRing(m) {
  const count = m.count||0, target = m.target||0;
  const pct   = target>0 ? Math.min(100,Math.round((count/target)*100)) : 0;
  const circ  = 2*Math.PI*62;
  const offset= circ - (pct/100)*circ;
  const color = pct>=100?'#22C55E':pct>=60?'#F97316':'#EF4444';
  const ring  = document.getElementById('progressRing');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = color;
  document.getElementById('ringPct').textContent = `${pct}%`;
  document.getElementById('ringPct').style.color = color;
}

async function loadRecentSessions() {
  const q = query(
    collection(db,'sessions'),
    where('machine_code','==',machineCode),
    orderBy('started_at','desc'),
    limit(8)
  );
  const snap = await getDocs(q);
  const tbody = document.getElementById('recentBody');
  if (snap.empty) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">Belum ada sesi</td></tr>`;
    return;
  }
  tbody.innerHTML = snap.docs.map(d => {
    const r = d.data();
    const pct = r.target>0 ? Math.min(100,Math.round((r.count/r.target)*100)) : 0;
    const fc  = pct>=100?'var(--green)':pct>=60?'var(--orange)':'var(--red)';
    const dur = r.finished_at && r.started_at
      ? Math.floor((r.finished_at.toDate()-r.started_at.toDate())/1000) : null;
    const stMap = { completed:'<span style="color:var(--green);font-weight:600;font-size:11px">COMPLETED</span>', incomplete:'<span style="color:var(--orange);font-weight:600;font-size:11px">INCOMPLETE</span>', running:'<span style="color:var(--blue);font-weight:600;font-size:11px">RUNNING</span>' };
    return `<tr>
      <td>${r.operator_name||'-'}</td>
      <td>${r.product_name||'-'}</td>
      <td style="text-align:center">${r.layers||1}</td>
      <td class="name">${(r.count||0).toLocaleString()}</td>
      <td>${(r.target||0).toLocaleString()}</td>
      <td><div style="display:flex;align-items:center;gap:6px;min-width:90px">
        <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:${fc}"></div></div>
        <span style="font-size:11px;color:${fc};width:32px">${pct}%</span>
      </div></td>
      <td>${dur ? formatDuration(dur) : '-'}</td>
      <td>${stMap[r.status]||r.status}</td>
    </tr>`;
  }).join('');
}

async function loadChartData() {
  const days = {};
  for (let i=6;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    days[d.toISOString().split('T')[0]] = 0;
  }
  const oldest = new Date(); oldest.setDate(oldest.getDate()-7);
  const q = query(
    collection(db,'sessions'),
    where('machine_code','==',machineCode),
    where('started_at','>=',oldest),
    orderBy('started_at','desc')
  );
  const snap = await getDocs(q);
  snap.docs.forEach(d => {
    const r = d.data();
    const dt = r.started_at?.toDate ? r.started_at.toDate().toISOString().split('T')[0] : null;
    if (dt && days.hasOwnProperty(dt)) days[dt] += (r.count||0);
  });

  const labels = Object.keys(days).map(d=>new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short'}));
  const values = Object.values(days);

  if (prodChart) prodChart.destroy();
  prodChart = new Chart(document.getElementById('prodChart'), {
    type:'bar',
    data:{ labels, datasets:[{ label:'Produksi (pcs)', data:values,
      backgroundColor: values.map((_,i)=>i===values.length-1?'#F97316':'rgba(249,115,22,0.25)'),
      borderColor:'#F97316', borderWidth:1, borderRadius:6 }]
    },
    options:{ responsive:true, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:'#475569'},grid:{color:'rgba(255,255,255,0.04)'}},
               y:{ticks:{color:'#475569'},grid:{color:'rgba(255,255,255,0.04)'},beginAtZero:true} } }
  });
}

init();
</script>
</body>
</html>
